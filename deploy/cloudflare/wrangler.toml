name = "mcp-server"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"

# Build with worker-build (wraps wasm-pack + wasm-bindgen)
[build]
command = "worker-build --release"

# ── Variables ────────────────────────────────────────────────────────────────
[vars]
# Set to "true" to enable authentication
AUTH_ENABLED = "false"

# ── Secrets (set via `wrangler secret put SECRET_NAME`) ──────────────────────
# Secrets are not in wrangler.toml; set them with:
#   wrangler secret put API_KEY
#   wrangler secret put BEARER_TOKEN

# ── Optional: Durable Objects (uncomment for stateful SSE sessions) ──────────
# [[durable_objects.bindings]]
# name = "MCP_SESSION"
# class_name = "McpSessionDO"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["McpSessionDO"]

# ── Optional: KV (uncomment if you need key-value storage) ───────────────────
# [[kv_namespaces]]
# binding = "KV"
# id = "YOUR_KV_NAMESPACE_ID"

# ── Routes (uncomment to assign a custom domain) ─────────────────────────────
# routes = [
#   { pattern = "mcp.example.com/*", zone_name = "example.com" }
# ]
