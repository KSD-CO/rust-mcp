name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "deploy/cloudflare/**"   # only trigger when the worker changes
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:             # allow manual trigger

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: deploy/cloudflare

      - name: Install worker-build
        run: cargo install worker-build

      - name: Build worker
        working-directory: deploy/cloudflare
        run: worker-build --release

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: deploy/cloudflare
          # wrangler deploy is run automatically by the action
