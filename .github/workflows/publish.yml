name: Publish to crates.io

on:
  push:
    tags:
      - "v*"          # trigger on any tag like v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Run CI first ─────────────────────────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        run: cargo test --workspace --all-features

  # ── Publish (in dependency order) ────────────────────────────────────────────
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: test
    environment: crates-io  # optional: require manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Publish in dependency order (skip if already published)
      # 1. mcp-kit-macros (no internal deps)
      - name: Publish mcp-kit-macros
        run: cargo publish -p mcp-kit-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "mcp-kit-macros already published, skipping"

      - name: Wait for indexing
        run: sleep 15

      # 2. mcp-kit (depends on mcp-kit-macros)
      - name: Publish mcp-kit
        run: cargo publish -p mcp-kit --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "mcp-kit already published, skipping"

      - name: Wait for indexing
        run: sleep 15

      # 3. mcp-kit-client (depends on mcp-kit)
      - name: Publish mcp-kit-client
        run: cargo publish -p mcp-kit-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "mcp-kit-client already published, skipping"

      - name: Wait for indexing
        run: sleep 15

      # 4. mcp-kit-gateway (depends on mcp-kit + mcp-kit-client)
      - name: Publish mcp-kit-gateway
        run: cargo publish -p mcp-kit-gateway --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "mcp-kit-gateway already published, skipping"
