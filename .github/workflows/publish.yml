name: Publish to crates.io

on:
  push:
    tags:
      - "v*"          # trigger on any tag like v0.1.0, v1.2.3, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Run CI first ─────────────────────────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        run: cargo test --workspace --all-features

  # ── Publish (in dependency order) ────────────────────────────────────────────
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: test
    environment: crates-io  # optional: require manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Publish in dependency order
      - name: Publish rust-mcp-macros
        run: cargo publish -p rust-mcp-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for rust-mcp-macros to be indexed
        run: sleep 20

      - name: Publish rust-mcp (root)
        run: cargo publish -p rust-mcp --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
